name: ci

on:
  push:
    branches: [develop, main]
  pull_request:
  workflow_call:          # lets release.yml gate on this workflow before building

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          install: false   # don't pull git-flow-next/actionlint/etc.; we only need rust
      - run: mise install rust
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings   # [lints.clippy] pedantic in Cargo.toml makes this enforce pedantic
      - run: cargo test
      - run: cargo build

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          install: false
      - run: mise install rust "cargo:cargo-audit"
      - run: cargo audit

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          install: false
      - run: mise install rust "aqua:taiki-e/cargo-llvm-cov"
      - run: mise run coverage   # writes codecov.json; glue files excluded (see mise.toml regex)
      - name: Upload to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        uses: codecov/codecov-action@v7
        with:
          files: target/codecov.json
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false   # a Codecov outage (or missing token) must not fail the gate
