name: docs

on:
  release:
    types: [published]
  workflow_dispatch:

# Pages deploy: read the repo, mint the OIDC token deploy-pages needs, and
# write to Pages. contents:read is required because setting permissions at all
# drops every unlisted scope to none (checkout would lose read otherwise).
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; the default (no cancel-in-progress) lets an
# in-flight production deploy finish rather than being killed by a newer run.
concurrency:
  group: pages

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          install: false   # only node is needed, not git-flow-next/actionlint/etc.
      - run: mise install node
      # node is a core mise tool, so bare node/npm resolve via mise-action's shims
      # (like ci.yml's bare cargo). NOT `mise exec -- npm`: with no tool arg it
      # reinstalls the whole mise.toml toolchain (rust + aqua) on every run.
      - run: npm ci
      - run: npm run docs:build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
